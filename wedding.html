<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FFF8F3" />
  <title>Vamsi & Uma Pragna | Royal Wedding Invitation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "framer-motion": "https://esm.sh/framer-motion@11.18.2?external=react,react-dom"
      }
    }
  </script>
  <style>
    :root {
      --cream: #FFF8F3;
      --blush: #F5E4E0;
      --rose-gold: #D8A48F;
      --gold: #D4AF37;
      --charcoal: #333333;
      --deep-rose: #9D5C63;
      --ivory-glass: rgba(255, 248, 243, 0.72);
      --shadow: 0 28px 80px rgba(93, 48, 35, 0.16);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--charcoal);
      background: var(--cream);
      font-family: 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      overflow-x: hidden;
    }
    body.invitation-locked { overflow: hidden; }
    button, input { font: inherit; }
    button { cursor: pointer; }

    .app-shell {
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 10%, rgba(245, 228, 224, 0.95), transparent 33rem),
        radial-gradient(circle at 86% 20%, rgba(216, 164, 143, 0.25), transparent 25rem),
        linear-gradient(145deg, #fffdf9 0%, var(--cream) 48%, #f8ebe6 100%);
      position: relative;
      isolation: isolate;
    }
    .app-shell::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background-image:
        linear-gradient(30deg, rgba(212,175,55,0.035) 12%, transparent 12.5%, transparent 87%, rgba(212,175,55,0.035) 87.5%, rgba(212,175,55,0.035)),
        linear-gradient(150deg, rgba(212,175,55,0.035) 12%, transparent 12.5%, transparent 87%, rgba(212,175,55,0.035) 87.5%, rgba(212,175,55,0.035));
      background-size: 54px 94px;
      opacity: 0.65;
      mask-image: linear-gradient(to bottom, black, transparent 86%);
    }

    .font-script { font-family: 'Great Vibes', cursive; }
    .font-display { font-family: 'Cormorant Garamond', Georgia, serif; }
    .eyebrow {
      color: var(--deep-rose);
      font-size: 0.72rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .section {
      min-height: 100vh;
      padding: 7rem clamp(1.15rem, 5vw, 5rem);
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }
    .section-inner { width: min(1120px, 100%); position: relative; z-index: 2; }
    .section-title {
      margin: 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 10vw, 6.5rem);
      line-height: 0.9;
      font-weight: 500;
      color: #57362e;
      text-align: center;
    }
    .gold-divider {
      width: min(220px, 56vw);
      height: 1px;
      margin: 1.5rem auto;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      position: relative;
    }
    .gold-divider::before, .gold-divider::after {
      content: '✦';
      color: var(--gold);
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.75rem;
    }
    .gold-divider::before { left: 45%; }
    .gold-divider::after { right: 45%; }

    .opening {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 40%, rgba(255,255,255,0.96), transparent 18rem),
        radial-gradient(circle at 18% 18%, rgba(216,164,143,0.42), transparent 18rem),
        radial-gradient(circle at 84% 80%, rgba(245,228,224,0.95), transparent 22rem),
        linear-gradient(135deg, var(--cream), var(--blush));
    }
    .opening::before {
      content: '';
      position: absolute;
      width: 88vmin;
      height: 88vmin;
      border: 1px solid rgba(212,175,55,0.34);
      border-radius: 50%;
      box-shadow: inset 0 0 90px rgba(212,175,55,0.1), 0 0 80px rgba(216,164,143,0.18);
      animation: haloPulse 7s ease-in-out infinite;
    }
    @keyframes haloPulse { 50% { transform: scale(1.035); opacity: 0.68; } }
    .opening-card {
      width: min(88vw, 520px);
      min-height: 64vh;
      padding: clamp(2rem, 8vw, 4.25rem) 1.5rem;
      border: 1px solid rgba(212,175,55,0.35);
      border-radius: 46px;
      background: rgba(255, 248, 243, 0.56);
      box-shadow: var(--shadow), inset 0 0 0 10px rgba(255,255,255,0.32);
      backdrop-filter: blur(22px);
      text-align: center;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .opening-card::before, .opening-card::after {
      content: '❦';
      position: absolute;
      color: rgba(212,175,55,0.52);
      font-size: 2rem;
      left: 50%;
      transform: translateX(-50%);
    }
    .opening-card::before { top: 1.2rem; }
    .opening-card::after { bottom: 1.2rem; }
    .monogram {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.3rem, 17vw, 6.2rem);
      letter-spacing: 0.08em;
      color: #6f463b;
      text-shadow: 0 10px 34px rgba(216,164,143,0.4);
    }
    .heart { color: var(--gold); font-size: 0.48em; vertical-align: middle; margin: 0 0.12em; }
    .opening-names {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2.6rem, 12vw, 5rem);
      color: #5c342f;
      margin: 0.6rem 0 0;
    }
    .luxury-button {
      border: 1px solid rgba(212,175,55,0.68);
      border-radius: 999px;
      padding: 1rem 1.75rem;
      min-width: 210px;
      color: #fffaf3;
      background: linear-gradient(135deg, #b6822b, var(--gold), #bd7f66);
      box-shadow: 0 18px 42px rgba(157,92,99,0.25), inset 0 1px 0 rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.72rem;
      font-weight: 600;
      transition: transform 400ms ease, box-shadow 400ms ease;
    }
    .luxury-button:hover { transform: translateY(-3px); box-shadow: 0 24px 54px rgba(157,92,99,0.34); }
    .particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(212,175,55,0.72);
      box-shadow: 0 0 18px rgba(212,175,55,0.82);
      animation: particleFloat var(--duration) ease-in-out infinite;
      left: var(--x);
      top: var(--y);
      opacity: 0.55;
    }
    @keyframes particleFloat {
      0%, 100% { transform: translate3d(0,0,0) scale(0.7); opacity: 0.18; }
      50% { transform: translate3d(var(--drift), -42px, 0) scale(1.18); opacity: 0.85; }
    }
    .door-stage { position: fixed; inset: 0; pointer-events: none; z-index: 120; display: flex; }
    .door {
      width: 50%;
      height: 100%;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.16), transparent 16rem),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0 2px, transparent 2px 7rem),
        linear-gradient(145deg, #6a2f28, #a75a4c 44%, #4d211f 100%);
      border-color: rgba(212,175,55,0.6);
      box-shadow: inset 0 0 0 9px rgba(212,175,55,0.18), inset 0 0 70px rgba(0,0,0,0.32);
      position: relative;
    }
    .door.left { border-right: 3px solid rgba(212,175,55,0.72); transform-origin: left center; }
    .door.right { border-left: 3px solid rgba(212,175,55,0.72); transform-origin: right center; }
    .door::before {
      content: '';
      position: absolute;
      inset: 9% 8%;
      border: 1px solid rgba(212,175,55,0.42);
      border-radius: 999px 999px 20px 20px;
      background: linear-gradient(180deg, transparent, rgba(212,175,55,0.08));
    }
    .door::after {
      content: '✦';
      position: absolute;
      top: 49%;
      color: var(--gold);
      font-size: 1.6rem;
      filter: drop-shadow(0 0 12px rgba(212,175,55,0.72));
    }
    .door.left::after { right: 1.6rem; }
    .door.right::after { left: 1.6rem; }

    .hero {
      min-height: 100svh;
      text-align: center;
      color: #51352f;
      background:
        linear-gradient(rgba(255,248,243,0.55), rgba(255,248,243,0.96)),
        radial-gradient(circle at 50% 18%, rgba(216,164,143,0.28), transparent 22rem);
    }
    .hero-bg {
      position: absolute;
      inset: -6%;
      z-index: 0;
      background:
        radial-gradient(circle at 22% 25%, rgba(245,228,224,0.9), transparent 19rem),
        radial-gradient(circle at 82% 18%, rgba(212,175,55,0.16), transparent 18rem),
        radial-gradient(circle at 56% 78%, rgba(216,164,143,0.21), transparent 22rem);
      animation: slowZoom 18s ease-in-out infinite alternate;
    }
    @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.09); } }
    .floral {
      position: absolute;
      color: rgba(157,92,99,0.28);
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(5rem, 24vw, 13rem);
      line-height: 1;
      pointer-events: none;
      filter: drop-shadow(0 18px 32px rgba(216,164,143,0.16));
    }
    .floral.one { top: 7%; left: -1.5rem; transform: rotate(-18deg); }
    .floral.two { right: -2rem; bottom: 9%; transform: rotate(18deg); }
    .hero-names {
      margin: 0;
      font-family: 'Great Vibes', cursive;
      font-size: clamp(4.35rem, 19vw, 10rem);
      line-height: 0.92;
      color: #5a342f;
      text-shadow: 0 18px 45px rgba(216,164,143,0.22);
    }
    .ampersand {
      display: block;
      color: var(--gold);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.62em;
      line-height: 0.75;
      margin: 0.2rem 0;
    }
    .hero-copy {
      max-width: 620px;
      margin: 1.6rem auto 0;
      font-size: clamp(1rem, 2.4vw, 1.25rem);
      line-height: 1.9;
      color: rgba(51,51,51,0.78);
    }
    .hero-details {
      margin-top: 2rem;
      display: grid;
      gap: 0.65rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.45rem, 4.6vw, 2.3rem);
      color: #6a463e;
    }

    .countdown-grid, .events-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(0.75rem, 2vw, 1.5rem);
      margin-top: 3rem;
    }
    .glass-card {
      background: linear-gradient(145deg, rgba(255,255,255,0.72), rgba(245,228,224,0.43));
      border: 1px solid rgba(212,175,55,0.34);
      border-radius: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      position: relative;
      overflow: hidden;
    }
    .glass-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.5) 35%, transparent 70%);
      transform: translateX(-120%);
      transition: transform 900ms ease;
    }
    .glass-card:hover::before { transform: translateX(120%); }
    .count-card { padding: clamp(1rem, 4vw, 2rem) 0.55rem; text-align: center; }
    .count-value {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.25rem, 9vw, 5.5rem);
      line-height: 0.9;
      color: #6b3d35;
      font-weight: 600;
    }
    .count-label { color: var(--deep-rose); font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; }

    .events-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); align-items: stretch; }
    .event-card { padding: clamp(1.55rem, 4vw, 2.6rem); min-height: 280px; display: flex; flex-direction: column; justify-content: space-between; }
    .event-card h3 { margin: 0.85rem 0 1rem; font-family: 'Cormorant Garamond', serif; font-size: clamp(2.4rem, 7vw, 4.6rem); line-height: 0.92; color: #5b342e; font-weight: 500; }
    .event-meta { display: grid; gap: 0.65rem; color: rgba(51,51,51,0.76); }
    .meal { margin-top: 1.1rem; color: var(--deep-rose); font-weight: 500; }

    .venue-layout {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: clamp(1rem, 4vw, 2.4rem);
      align-items: stretch;
      margin-top: 3rem;
    }
    .venue-card { padding: clamp(1.7rem, 5vw, 3rem); display: grid; align-content: center; }
    .venue-card h3 { margin: 0 0 1rem; font-family: 'Cormorant Garamond', serif; font-size: clamp(2.6rem, 7vw, 4.8rem); line-height: 0.95; color: #57362e; font-weight: 500; }
    .map-frame { min-height: 420px; border-radius: 32px; overflow: hidden; border: 1px solid rgba(212,175,55,0.38); box-shadow: var(--shadow); background: var(--blush); }
    .map-frame iframe { width: 100%; height: 100%; border: 0; display: block; }
    .directions { text-decoration: none; display: inline-flex; align-items: center; justify-content: center; margin-top: 1.8rem; }

    .rsvp-card {
      width: min(720px, 100%);
      margin: 3rem auto 0;
      padding: clamp(1.4rem, 5vw, 3.2rem);
      text-align: center;
    }
    .rsvp-card h3 { margin: 0 0 2rem; font-family: 'Cormorant Garamond', serif; font-size: clamp(2.4rem, 8vw, 4.5rem); color: #57362e; font-weight: 500; }
    .form-grid { display: grid; gap: 1rem; text-align: left; }
    label { display: grid; gap: 0.45rem; color: var(--deep-rose); font-size: 0.74rem; letter-spacing: 0.13em; text-transform: uppercase; }
    input {
      width: 100%;
      border: 1px solid rgba(212,175,55,0.32);
      background: rgba(255,255,255,0.62);
      border-radius: 18px;
      padding: 1rem 1.1rem;
      outline: none;
      color: var(--charcoal);
      transition: border-color 250ms ease, box-shadow 250ms ease;
    }
    input:focus { border-color: var(--gold); box-shadow: 0 0 0 4px rgba(212,175,55,0.12); }
    .rsvp-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-top: 1.25rem; }
    .secondary-button {
      border: 1px solid rgba(157,92,99,0.24);
      color: #7d4943;
      background: rgba(255,255,255,0.54);
      border-radius: 999px;
      padding: 1rem 1.1rem;
      box-shadow: 0 14px 32px rgba(93,48,35,0.09);
      transition: transform 350ms ease, border-color 350ms ease;
    }
    .secondary-button:hover { transform: translateY(-2px); border-color: rgba(212,175,55,0.55); }
    .footer { text-align: center; padding: 4rem 1.25rem 6rem; color: rgba(51,51,51,0.66); }
    .footer .font-script { color: #5a342f; font-size: clamp(2.7rem, 10vw, 4.8rem); }

    @media (max-width: 820px) {
      .countdown-grid { grid-template-columns: repeat(2, 1fr); }
      .events-grid, .venue-layout { grid-template-columns: 1fr; }
      .section { padding-top: 5.5rem; padding-bottom: 5.5rem; }
      .map-frame { min-height: 340px; }
    }
    @media (max-width: 520px) {
      .opening-card { border-radius: 34px; min-height: 58vh; }
      .countdown-grid { gap: 0.65rem; }
      .glass-card { border-radius: 24px; }
      .rsvp-actions { grid-template-columns: 1fr; }
      .luxury-button { width: 100%; min-width: 0; padding-left: 1rem; padding-right: 1rem; }
      .section { padding-left: 1rem; padding-right: 1rem; }
      .hero-copy { line-height: 1.75; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; transition-duration: 0.001ms !important; }
    }
  </style>
</head>
<body class="invitation-locked">
  <div id="root"></div>
  <script type="module">
    import React, { useEffect, useRef, useState } from 'react';
    import { createRoot } from 'react-dom/client';
    import { AnimatePresence, motion, useScroll, useTransform } from 'framer-motion';

    const h = React.createElement;
    const weddingDate = new Date('2027-08-30T11:30:00-05:00');
    const particles = Array.from({ length: 36 }, (_, index) => ({
      id: index,
      x: `${(index * 29) % 101}%`,
      y: `${(index * 47) % 100}%`,
      drift: `${index % 2 ? '-' : ''}${18 + (index % 7) * 8}px`,
      duration: `${6 + (index % 9) * 0.7}s`,
    }));

    function playInvitationMusic() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      const ctx = new AudioContext();
      const master = ctx.createGain();
      master.gain.setValueAtTime(0.0001, ctx.currentTime);
      master.gain.exponentialRampToValueAtTime(0.055, ctx.currentTime + 1.6);
      master.connect(ctx.destination);
      const notes = [261.63, 329.63, 392.00, 493.88, 392.00, 329.63];
      notes.forEach((note, index) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = index % 2 ? 'triangle' : 'sine';
        osc.frequency.value = note;
        gain.gain.setValueAtTime(0.0001, ctx.currentTime + index * 0.34);
        gain.gain.exponentialRampToValueAtTime(0.035, ctx.currentTime + index * 0.34 + 0.08);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + index * 0.34 + 1.4);
        osc.connect(gain).connect(master);
        osc.start(ctx.currentTime + index * 0.34);
        osc.stop(ctx.currentTime + index * 0.34 + 1.55);
      });
      setTimeout(() => {
        master.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1.5);
        setTimeout(() => ctx.close(), 1800);
      }, 9000);
    }

    function useCountdown(target) {
      const [time, setTime] = useState({ days: '000', hours: '00', minutes: '00', seconds: '00' });
      useEffect(() => {
        const tick = () => {
          const distance = Math.max(target.getTime() - Date.now(), 0);
          const days = Math.floor(distance / 86400000);
          const hours = Math.floor((distance % 86400000) / 3600000);
          const minutes = Math.floor((distance % 3600000) / 60000);
          const seconds = Math.floor((distance % 60000) / 1000);
          setTime({
            days: String(days).padStart(3, '0'),
            hours: String(hours).padStart(2, '0'),
            minutes: String(minutes).padStart(2, '0'),
            seconds: String(seconds).padStart(2, '0'),
          });
        };
        tick();
        const timer = setInterval(tick, 1000);
        return () => clearInterval(timer);
      }, [target]);
      return time;
    }

    const fadeUp = {
      hidden: { opacity: 0, y: 44, filter: 'blur(8px)' },
      visible: { opacity: 1, y: 0, filter: 'blur(0px)', transition: { duration: 1.15, ease: [0.19, 1, 0.22, 1] } },
    };
    const stagger = { visible: { transition: { staggerChildren: 0.18, delayChildren: 0.15 } } };

    function Particles() {
      return h('div', { className: 'particles', 'aria-hidden': true },
        particles.map((particle) => h('span', {
          key: particle.id,
          className: 'particle',
          style: { '--x': particle.x, '--y': particle.y, '--drift': particle.drift, '--duration': particle.duration },
        }))
      );
    }

    function OpeningInvitation({ entered, opening, onOpen }) {
      return h(AnimatePresence, null,
        !entered && h(motion.div, {
          className: 'opening',
          initial: { opacity: 1 },
          exit: { opacity: 0, transition: { duration: 1.25, ease: 'easeInOut', delay: 1.05 } },
        },
          h(Particles),
          h(motion.div, {
            className: 'opening-card',
            variants: stagger,
            initial: 'hidden',
            animate: 'visible',
          },
            h(motion.div, { className: 'monogram', variants: fadeUp }, 'V ', h('span', { className: 'heart' }, '♥'), ' P'),
            h(motion.h1, { className: 'opening-names', variants: fadeUp }, 'Vamsi & Uma Pragna'),
            h(motion.div, { className: 'gold-divider', variants: fadeUp, 'aria-hidden': true }),
            h(motion.p, { className: 'eyebrow', variants: fadeUp }, 'A royal invitation awaits'),
            h(motion.button, { className: 'luxury-button', variants: fadeUp, onClick: onOpen, whileTap: { scale: 0.97 }, disabled: opening }, opening ? 'Revealing...' : 'Open Invitation')
          ),
          opening && h(motion.div, { className: 'door-stage', initial: { opacity: 1 }, animate: { opacity: 1 }, exit: { opacity: 0 } },
            h(motion.div, { className: 'door left', initial: { x: 0 }, animate: { x: '-102%' }, transition: { duration: 2.05, ease: [0.77, 0, 0.175, 1] } }),
            h(motion.div, { className: 'door right', initial: { x: 0 }, animate: { x: '102%' }, transition: { duration: 2.05, ease: [0.77, 0, 0.175, 1] } })
          )
        )
      );
    }

    function HeroSection() {
      const ref = useRef(null);
      const { scrollYProgress } = useScroll({ target: ref, offset: ['start start', 'end start'] });
      const yOne = useTransform(scrollYProgress, [0, 1], [0, -90]);
      const yTwo = useTransform(scrollYProgress, [0, 1], [0, 75]);
      return h('section', { ref, className: 'section hero' },
        h('div', { className: 'hero-bg' }),
        h(motion.div, { className: 'floral one', style: { y: yOne }, 'aria-hidden': true }, '❦'),
        h(motion.div, { className: 'floral two', style: { y: yTwo }, 'aria-hidden': true }, '❧'),
        h(motion.div, { className: 'section-inner', variants: stagger, initial: 'hidden', whileInView: 'visible', viewport: { once: true, amount: 0.35 } },
          h(motion.p, { className: 'eyebrow', variants: fadeUp }, 'Together with their families'),
          h(motion.h1, { className: 'hero-names', variants: fadeUp }, 'Uma Pragna', h('span', { className: 'ampersand' }, '&'), 'Vamsi'),
          h(motion.div, { className: 'gold-divider', variants: fadeUp, 'aria-hidden': true }),
          h(motion.p, { className: 'hero-copy', variants: fadeUp }, 'Together with their families', h('br'), 'invite you to celebrate their wedding'),
          h(motion.div, { className: 'hero-details', variants: fadeUp },
            h('strong', null, 'August 30, 2027'),
            h('span', null, 'The Bella Grande Ranch'),
            h('span', null, 'Celina, Texas')
          )
        )
      );
    }

    function CountdownSection() {
      const time = useCountdown(weddingDate);
      const units = [['Days', time.days], ['Hours', time.hours], ['Minutes', time.minutes], ['Seconds', time.seconds]];
      return h('section', { className: 'section' },
        h(Particles),
        h(motion.div, { className: 'section-inner', variants: stagger, initial: 'hidden', whileInView: 'visible', viewport: { once: true, amount: 0.25 } },
          h(motion.p, { className: 'eyebrow', variants: fadeUp, style: { textAlign: 'center' } }, 'Counting down to forever'),
          h(motion.h2, { className: 'section-title', variants: fadeUp }, 'The Celebration Begins'),
          h(motion.div, { className: 'gold-divider', variants: fadeUp, 'aria-hidden': true }),
          h(motion.div, { className: 'countdown-grid', variants: stagger }, units.map(([label, value]) =>
            h(motion.div, { key: label, className: 'glass-card count-card', variants: fadeUp, whileHover: { y: -8, transition: { duration: 0.45 } } },
              h('span', { className: 'count-value' }, value),
              h('span', { className: 'count-label' }, label)
            )
          ))
        )
      );
    }

    function EventsSection() {
      const events = [
        { title: 'Carnival Night', date: 'August 29, 2027', time: '6:00 PM', meal: 'Dinner Provided' },
        { title: 'Wedding Ceremony', date: 'August 30, 2027', time: '11:30 AM', meal: 'Lunch Provided' },
      ];
      return h('section', { className: 'section' },
        h(motion.div, { className: 'section-inner', variants: stagger, initial: 'hidden', whileInView: 'visible', viewport: { once: true, amount: 0.25 } },
          h(motion.p, { className: 'eyebrow', variants: fadeUp, style: { textAlign: 'center' } }, 'Wedding festivities'),
          h(motion.h2, { className: 'section-title', variants: fadeUp }, 'Events'),
          h(motion.div, { className: 'gold-divider', variants: fadeUp, 'aria-hidden': true }),
          h(motion.div, { className: 'events-grid', variants: stagger }, events.map((event) =>
            h(motion.article, { key: event.title, className: 'glass-card event-card', variants: fadeUp, whileHover: { y: -10, scale: 1.015 }, transition: { duration: 0.45 } },
              h('div', null,
                h('p', { className: 'eyebrow' }, event.date),
                h('h3', null, event.title),
                h('div', { className: 'event-meta' },
                  h('span', null, 'Time: ', h('strong', null, event.time)),
                  h('span', null, 'Venue: The Bella Grande Ranch')
                )
              ),
              h('div', { className: 'meal' }, event.meal)
            )
          ))
        )
      );
    }

    function VenueSection() {
      const directions = 'https://www.google.com/maps/search/?api=1&query=The%20Bella%20Grande%20Ranch%20Celina%20Texas';
      return h('section', { className: 'section' },
        h(motion.div, { className: 'section-inner', variants: stagger, initial: 'hidden', whileInView: 'visible', viewport: { once: true, amount: 0.22 } },
          h(motion.p, { className: 'eyebrow', variants: fadeUp, style: { textAlign: 'center' } }, 'Where love gathers'),
          h(motion.h2, { className: 'section-title', variants: fadeUp }, 'Venue'),
          h(motion.div, { className: 'gold-divider', variants: fadeUp, 'aria-hidden': true }),
          h('div', { className: 'venue-layout' },
            h(motion.div, { className: 'glass-card venue-card', variants: fadeUp, whileHover: { y: -8 } },
              h('p', { className: 'eyebrow' }, 'The destination'),
              h('h3', null, 'The Bella Grande Ranch'),
              h('p', { className: 'hero-copy', style: { margin: 0 } }, 'Celina, Texas'),
              h('a', { className: 'luxury-button directions', href: directions, target: '_blank', rel: 'noreferrer' }, 'Open Directions')
            ),
            h(motion.div, { className: 'map-frame', variants: fadeUp },
              h('iframe', {
                title: 'Map to The Bella Grande Ranch in Celina, Texas',
                loading: 'lazy',
                referrerPolicy: 'no-referrer-when-downgrade',
                src: 'https://www.google.com/maps?q=The%20Bella%20Grande%20Ranch%20Celina%20Texas&output=embed'
              })
            )
          )
        )
      );
    }

    function RSVPSection() {
      const [reply, setReply] = useState('');
      return h('section', { className: 'section' },
        h(motion.div, { className: 'section-inner', variants: stagger, initial: 'hidden', whileInView: 'visible', viewport: { once: true, amount: 0.25 } },
          h(motion.p, { className: 'eyebrow', variants: fadeUp, style: { textAlign: 'center' } }, 'Kindly respond'),
          h(motion.h2, { className: 'section-title', variants: fadeUp }, 'RSVP'),
          h(motion.div, { className: 'gold-divider', variants: fadeUp, 'aria-hidden': true }),
          h(motion.form, { className: 'glass-card rsvp-card', variants: fadeUp, onSubmit: (event) => event.preventDefault() },
            h('h3', null, 'Will you celebrate with us?'),
            h('div', { className: 'form-grid' },
              h('label', null, 'Name', h('input', { type: 'text', placeholder: 'Your full name', autoComplete: 'name' })),
              h('label', null, 'Phone Number', h('input', { type: 'tel', placeholder: '(555) 123-4567', autoComplete: 'tel' })),
              h('label', null, 'Guest Count', h('input', { type: 'number', min: '1', placeholder: 'Number of guests' }))
            ),
            h('div', { className: 'rsvp-actions' },
              h(motion.button, { type: 'button', className: 'luxury-button', whileTap: { scale: 0.97 }, onClick: () => setReply('We cannot wait to celebrate with you.') }, 'Joyfully Accept'),
              h(motion.button, { type: 'button', className: 'secondary-button', whileTap: { scale: 0.97 }, onClick: () => setReply('Thank you for letting us know with love.') }, 'Regretfully Decline')
            ),
            reply && h(motion.p, { initial: { opacity: 0, y: 12 }, animate: { opacity: 1, y: 0 }, className: 'hero-copy', style: { marginBottom: 0 } }, reply)
          )
        )
      );
    }

    function App() {
      const [opening, setOpening] = useState(false);
      const [entered, setEntered] = useState(false);
      const handleOpen = () => {
        if (opening) return;
        setOpening(true);
        playInvitationMusic();
        setTimeout(() => setEntered(true), 2350);
      };
      useEffect(() => {
        document.body.classList.toggle('invitation-locked', !entered);
      }, [entered]);
      return h(React.Fragment, null,
        h(OpeningInvitation, { entered, opening, onOpen: handleOpen }),
        h(motion.main, { className: 'app-shell', initial: { opacity: 0 }, animate: { opacity: entered ? 1 : 0.18 }, transition: { duration: 1.35, ease: 'easeOut' } },
          h(HeroSection),
          h(CountdownSection),
          h(EventsSection),
          h(VenueSection),
          h(RSVPSection),
          h('footer', { className: 'footer' },
            h('div', { className: 'font-script' }, 'Vamsi & Uma Pragna'),
            h('p', null, 'August 30, 2027 • The Bella Grande Ranch • Celina, Texas')
          )
        )
      );
    }

    createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
